# Exemplo: Nginx no HOST (Ubuntu) com Certbot, fazendo proxy para o Docker.
# Copie/adapte em /etc/nginx/sites-available/clinicos.com.br
# e confira: sudo nginx -t && sudo systemctl reload nginx
#
# O container deve expor HTTP em 127.0.0.1:8080 (no .env: APP_PORT=8080)
# para liberar a porta 80/443 no host para este Nginx.

server {
    listen 80;
    listen [::]:80;
    server_name clinicos.com.br www.clinicos.com.br;

    # Certbot adiciona redirect para HTTPS; mantenha ou use o bloco que o certbot gerar.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clinicos.com.br www.clinicos.com.br;

    # Caminhos gerados pelo certbot:
    ssl_certificate /etc/letsencrypt/live/clinicos.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinicos.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
