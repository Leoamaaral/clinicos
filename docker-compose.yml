services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: anamnese-app:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    env_file:
      - .env
    environment:
      LOG_CHANNEL: stderr
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - anamnese

  queue:
    image: anamnese-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOG_CHANNEL: stderr
      DB_HOST: mysql
      DB_PORT: 3306
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - anamnese

  scheduler:
    image: anamnese-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOG_CHANNEL: stderr
      DB_HOST: mysql
      DB_PORT: 3306
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - anamnese

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-anamnese}
      MYSQL_USER: ${DB_USERNAME:-anamnese}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - anamnese

volumes:
  mysql_data:
  storage_data:
  logs_data:

networks:
  anamnese:
    driver: bridge
